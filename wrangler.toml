name = "lunch-and-learn"
compatibility_date = "2025-07-15"
pages_build_output_dir = "dist"

# KV bindings for this project live in the Cloudflare dashboard:
#   Pages project → Settings → Bindings → KV namespace
#   Variable name: STORYBLOK_CACHE
#
# If you prefer config-as-code, uncomment and paste the real namespace IDs
# (from Storage & Databases → KV → your namespace → "ID"). Cloudflare will
# then use these instead of any dashboard binding for the same variable.
#
# [[kv_namespaces]]
# binding = "STORYBLOK_CACHE"
# id = "<prod KV id>"
# preview_id = "<preview KV id>"
